[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "band-deck"
version = "0.1.0"
description = "Musician-friendly HTML slide decks with lyrics and chords, generated from public sources."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Band-Deck Maintainers" }]
keywords = ["music", "html", "marp", "lyrics", "chords", "slides", "performance"]
classifiers = [
  "Framework :: Flask",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Multimedia :: Graphics :: Presentation",
  "Operating System :: OS Independent",
]
dependencies = [
  "Flask>=3.0",
  "requests>=2.30",
  "beautifulsoup4>=4.12",
  "pyyaml==6.0.1",
  "jsonschema==4.21.1",
]

[project.urls]
Homepage = "https://github.com/example/band-deck"

# -----------------------------------------------------------------------------
# Dependency groups (PEP 735)
# -----------------------------------------------------------------------------
# Test/lint/format tooling lives in the PEP 735 `dev` group. `uv sync`
# installs it by default; `uv sync --no-dev` skips it.
# Spec: https://peps.python.org/pep-0735/
[dependency-groups]
dev = [
  "pytest>=7",
  "pytest-cov>=4",
  "ruff>=0.4",
  "hypothesis>=6.88.0",
]

# -----------------------------------------------------------------------------
# pytest configuration
# -----------------------------------------------------------------------------
# Tests live at the project root (not inside src/). 'pythonpath = ["src"]'
# keeps the existing 'from src.*' imports working without per-test sys.path
# manipulation. Tests are auto-discovered from 'tests/test_*.py'.
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.hatch.build.targets.sdist]
# Keep ephemeral and template binary content out of source distributions.
exclude = [
  "/.git",
  "/.gitignore",
  "/venv",
  "/.venv",
  "/env",
  "/__pycache__",
  "/**/__pycache__",
  "/*.py[cod]",
  "/**/*.py[cod]",
  "/src/saved_slides/*.json",
  "/~$*",
]

# -----------------------------------------------------------------------------
# uv configuration
# -----------------------------------------------------------------------------
# This project uses `uv` for dependency management. See https://docs.astral.sh/uv/
# Run `uv sync` to create a virtual environment (in `.venv`) and install every
# dependency, including the PEP 735 `dev` group. The lockfile (`uv.lock`) is
# committed so installs are fully reproducible.
#
# - Install everything (runtime + dev):   uv sync
# - Install runtime only:                 uv sync --no-dev
# Contributors: after editing dependencies, run `uv lock` (then `uv sync`).
[tool.uv]
package = true
